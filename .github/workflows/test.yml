# G8 Phase E — Multi-tier CI for the claude-workflow-plugin.
#
# Tier matrix (cross-ref: G8 plan, "Phase E — CI wiring"):
#   - lint           — shellcheck (advisory; never blocks).
#   - l1-unit        — bash unit tests (.claude/scripts/tests/).
#   - l2-component   — hook-pipeline component tests (.claude/tests/component/).
#                      Surfaces META-TEST counts as a distinct summary line so
#                      regression-injection sensitivity is visible at a glance
#                      (per QA's Phase D recommendation).
#   - l3-vitest-unit — offline self-tests of the E2E harness (~55 tests).
#   - manifest-validate — Zod-replica check of .claude-plugin/plugin.json.
#   - l3-live        — full E2E suite against real Claude. Conditional on
#                      ANTHROPIC_API_KEY secret. Posts cassette-diff +
#                      trace-summary to the PR.
#   - l4-drift-watch — daily cron of l3-live on main, surfaces drift.
#
# Permissions: contents:read (default checkout) + pull-requests:write
# (for posting cassette-diff and trace-summary comments). Nothing
# destructive. The l3-live job needs id-token:none — it never assumes
# an OIDC role.
#
# Notes on portability:
#   - All jobs run on ubuntu-latest. shellcheck is pre-installed on the
#     standard runner image so the lint job just calls `make lint`.
#   - jq is also pre-installed; bd (Beads CLI) is not — L1/L2 invoke bd
#     only inside specs that have a `bd` shim or self-skip. We mirror
#     the local convention of skip-with-log rather than failing.
#   - Node 20 (LTS) for the L3 jobs. The harness's package.json caps
#     deps at versions that work on 18+, but 20 is the latest LTS.
#
# BD_SHIM_ONLY=1 — set on the l1-unit and l2-component jobs. Beads has
# no easy public installer URL we can curl in CI; rather than vendoring a
# binary or spinning up a separate setup action, we let bd-dependent
# specs skip-with-log when the env var is set. Each spec calls
# `bd_required_or_skip` (or the L1 equivalent) near the top, prints a
# single "SKIPPED:" line, and exits 0. Dev machines (where bd IS
# installed) take the normal path and run the full coverage.

name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily drift watch at 06:00 UTC. Cron only triggers on the default
    # branch (main). Matches the G8 plan's "L4 daily on main" cadence.
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Manual trigger — useful for re-running the live tier after the
    # ANTHROPIC_API_KEY secret is rotated.

# Cancel stale runs on the same PR/branch when a new push arrives. The
# live tier is expensive; we don't want two of them racing on the same
# PR. Push-to-main and the scheduled drift watch always run to
# completion (concurrency group includes ref).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Lint — non-blocking. shellcheck on all hook scripts.
  # ---------------------------------------------------------------------------
  lint:
    name: shellcheck (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Verify shellcheck available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck not on PATH (Makefile's lint target skips with log)"
            exit 0
          fi
          shellcheck --version
      - name: Run make lint
        run: make lint

  # ---------------------------------------------------------------------------
  # L1 — bash unit tests.
  # ---------------------------------------------------------------------------
  l1-unit:
    name: L1 — bash unit tests
    runs-on: ubuntu-latest
    env:
      # See workflow header — bd has no public CI installer; specs
      # self-skip when this is set.
      BD_SHIM_ONLY: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Verify dependencies
        run: |
          jq --version
          bash --version | head -1
      - name: Run L1 suite
        run: bash .claude/scripts/tests/run-tests.sh

  # ---------------------------------------------------------------------------
  # L2 — component tier. Hook-pipeline tests with crafted stdin envelopes.
  # Captures the runner's log so the META-TEST scrape stays auditable; the
  # log is exposed as a job artifact for cross-job consumption by l3-live.
  # ---------------------------------------------------------------------------
  l2-component:
    name: L2 — component (hook pipelines)
    runs-on: ubuntu-latest
    env:
      # See workflow header — bd has no public CI installer; bd-dependent
      # specs self-skip when this is set.
      BD_SHIM_ONLY: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Verify dependencies
        run: |
          jq --version
          bash --version | head -1
      - name: Run L2 suite with full output capture
        id: run
        run: |
          set -o pipefail
          bash .claude/tests/component/run.sh 2>&1 | tee component-tier.log
      - name: Surface META-TEST summary (distinct category)
        if: always()
        run: |
          # META-TESTs prove the test's own sensitivity (vs regular
          # assertions, which prove SUT behaviour). We tally them
          # separately per QA's Phase D recommendation. The pattern
          # matches both helper-emitted lines (assert_eq with a
          # META-TEST name) and ad-hoc inline PASS/FAIL prints.
          total=$(grep -cE '^\s*(PASS|FAIL):\s+.*META-TEST' component-tier.log || true)
          pass=$(grep -cE '^\s*PASS:\s+.*META-TEST' component-tier.log || true)
          fail=$(grep -cE '^\s*FAIL:\s+.*META-TEST' component-tier.log || true)
          {
            echo "### META-TEST assertions"
            echo ""
            echo "_Distinct from regular assertions — META-TESTs prove the test's own sensitivity, not the SUT's behaviour._"
            echo ""
            echo "- Total: **${total}**"
            echo "- Passed: **${pass}**"
            echo "- Failed: **${fail}**"
            if [ "$fail" -gt 0 ]; then
              echo ""
              echo "Failures:"
              grep -E '^\s*FAIL:\s+.*META-TEST' component-tier.log | head -10 | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload component-tier log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-tier-log
          path: component-tier.log
          retention-days: 14

  # ---------------------------------------------------------------------------
  # L3 unit tier — ~55 offline self-tests of the e2e harness. No API key.
  # ---------------------------------------------------------------------------
  l3-vitest-unit:
    name: L3 — vitest unit (offline harness self-tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .claude/tests/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Cache npm by the package-lock for this workspace.
          cache: "npm"
          cache-dependency-path: .claude/tests/e2e/package-lock.json
      - name: Install harness dependencies
        run: npm ci
      - name: Run offline unit tier
        run: npm run test:unit
      - name: Sanity-check test count
        # The spec calls for ~55 unit tests passing. A regression that
        # drops the count below 50 likely means the test:unit filter
        # missed files; we fail loudly so it's caught.
        run: |
          # Vitest's JSON reporter would give a clean count; instead we
          # re-derive it from a second run with --reporter=json (cheap;
          # all 55 tests run in <300ms).
          mkdir -p .tmp
          npx vitest run unit.spec --reporter=json --outputFile=.tmp/unit-results.json
          count=$(jq '[.testResults[].assertionResults[]] | length' .tmp/unit-results.json)
          echo "Unit tests collected: $count"
          if [ "$count" -lt 50 ]; then
            echo "ERROR: unit test count fell below the floor of 50 (got $count)."
            echo "       Did the test:unit glob lose a file?"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Manifest validation — Zod-replica check of .claude-plugin/plugin.json.
  # Cheap, fast; runs separately from the unit tier so a manifest break
  # surfaces as its own check.
  # ---------------------------------------------------------------------------
  manifest-validate:
    name: Plugin manifest validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .claude/tests/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .claude/tests/e2e/package-lock.json
      - name: Install harness dependencies
        run: npm ci
      - name: Validate manifest
        run: npx tsx lib/validate-plugin-manifest.ts

  # ---------------------------------------------------------------------------
  # L3 live tier — full e2e suite against real Claude. Conditional.
  #
  # Gating: only runs when ANTHROPIC_API_KEY is set (secrets aren't
  # available on forked-PR runs, where the workflow runs in a
  # restricted permission context anyway). The job is a no-op skip,
  # NOT a failure, when the secret is missing — fork PRs shouldn't be
  # blocked on a tier they can't run.
  #
  # After a live run, two PR-comment posts:
  #   1. Cassette diff vs each committed golden. If any drifts, the
  #      diff is posted so reviewers can decide whether to refresh
  #      the cassette (consent gate per the determinism strategy).
  #   2. Trace summary — subagent tree + hook firing + Beads label
  #      transitions + META-TEST tally + total cost.
  # ---------------------------------------------------------------------------
  l3-live:
    name: L3 — live (real Claude)
    runs-on: ubuntu-latest
    # Only run on the same-repo PR/push path AND when the secret
    # exists. We can't reference `secrets.X` in `if:` directly, so we
    # gate on an env var derived from it below.
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [l3-vitest-unit, manifest-validate]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    defaults:
      run:
        working-directory: .claude/tests/e2e
    steps:
      - name: Skip if no API key (forks / unconfigured repos)
        id: gate
        # `secrets.X` evaluates to "" when missing; we propagate that
        # through env and consult it here. The job continues past this
        # step only if the secret is present.
        working-directory: ${{ github.workspace }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY is not set; skipping live tier."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .claude/tests/e2e/package-lock.json
      - if: steps.gate.outputs.skip != 'true'
        name: Install harness dependencies
        run: npm ci
      - if: steps.gate.outputs.skip != 'true'
        name: Download L2 component log (for META-TEST scrape)
        uses: actions/download-artifact@v4
        with:
          name: component-tier-log
          path: .claude/tests/e2e
        continue-on-error: true
      - if: steps.gate.outputs.skip != 'true'
        name: Run full E2E suite (live)
        run: npm run test:run
      - if: always() && steps.gate.outputs.skip != 'true'
        name: Diff cassettes against goldens
        id: diff
        run: |
          # For every replay produced this run, diff against the
          # matching golden. We use the filename prefix (everything
          # before the first ISO timestamp segment) as the fixture
          # identifier, then look up cassettes/golden/<fixture>.jsonl.
          set -u
          drift=0
          mkdir -p .tmp
          : > .tmp/cassette-diff-summary.md
          for replay in cassettes/replays/*.jsonl; do
            [ -e "$replay" ] || continue
            base=$(basename "$replay" | sed -E 's/-[0-9]{4}-[0-9]{2}-[0-9]{2}T.+\.jsonl$//')
            golden="cassettes/golden/$base.jsonl"
            if [ ! -f "$golden" ]; then
              echo "No golden for $replay — skipping diff."
              continue
            fi
            echo "Diffing $replay vs $golden"
            tmp=".tmp/diff-$base.md"
            # The CLI distinguishes 0 (match) / 1 (drift) / 2 (error).
            # We collect drifts; errors fail the step.
            set +e
            npm run --silent cassette-diff -- --replay "$replay" --golden "$golden" --out "$tmp"
            rc=$?
            set -e
            case "$rc" in
              0) echo "  match" ;;
              1)
                echo "  drift!"
                drift=1
                cat "$tmp" >> .tmp/cassette-diff-summary.md
                echo "" >> .tmp/cassette-diff-summary.md
                ;;
              *)
                echo "  cassette-diff exited $rc (invocation error)"
                exit "$rc"
                ;;
            esac
          done
          echo "drift=$drift" >> "$GITHUB_OUTPUT"
      - if: always() && steps.gate.outputs.skip != 'true' && steps.diff.outputs.drift == '1' && github.event_name == 'pull_request'
        name: Post cassette-diff comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        working-directory: ${{ github.workspace }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file .claude/tests/e2e/.tmp/cassette-diff-summary.md
      - if: always() && steps.gate.outputs.skip != 'true'
        name: Render PR trace summary
        run: |
          # Per-fixture summary. Each replay gets one PR comment so
          # reviewers can scroll through what each fixture did. The
          # component-tier log (if downloaded above) feeds META-TEST
          # tallies into every summary — they share the same gate
          # health, not per-fixture.
          set -u
          mkdir -p .tmp
          for replay in cassettes/replays/*.jsonl; do
            [ -e "$replay" ] || continue
            base=$(basename "$replay" | sed -E 's/\.jsonl$//')
            out=".tmp/pr-summary-$base.md"
            args=( --replay "$replay" --out "$out" )
            if [ -f component-tier.log ]; then
              args+=( --component-log component-tier.log )
            fi
            npm run --silent pr-summary -- "${args[@]}"
          done
      - if: always() && steps.gate.outputs.skip != 'true' && github.event_name == 'pull_request'
        name: Post trace-summary comment(s) on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        working-directory: ${{ github.workspace }}
        run: |
          for summary in .claude/tests/e2e/.tmp/pr-summary-*.md; do
            [ -e "$summary" ] || continue
            gh pr comment "$PR_NUMBER" --body-file "$summary"
          done
      - if: always() && steps.gate.outputs.skip != 'true'
        name: Upload replays + reports
        uses: actions/upload-artifact@v4
        with:
          name: l3-live-artifacts
          path: |
            .claude/tests/e2e/cassettes/replays/
            .claude/tests/e2e/.tmp/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # L4 — daily drift watch on main. Identical to l3-live but no PR
  # context (no PR comment posts; results go to the step summary +
  # workflow artifacts). A drift in this job is the early-warning
  # signal that the model or plugin surface shifted under us.
  # ---------------------------------------------------------------------------
  l4-drift-watch:
    name: L4 — daily drift watch (main)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    defaults:
      run:
        working-directory: .claude/tests/e2e
    steps:
      - name: Skip if no API key
        id: gate
        working-directory: ${{ github.workspace }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY is not set; drift watch can't run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: main
      - if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .claude/tests/e2e/package-lock.json
      - if: steps.gate.outputs.skip != 'true'
        name: Install harness dependencies
        run: npm ci
      - if: steps.gate.outputs.skip != 'true'
        name: Run full E2E suite (live, drift-watch)
        run: npm run test:run
      - if: always() && steps.gate.outputs.skip != 'true'
        name: Diff cassettes; surface drift in step summary
        run: |
          set -u
          drift=0
          mkdir -p .tmp
          : > .tmp/cassette-diff-summary.md
          for replay in cassettes/replays/*.jsonl; do
            [ -e "$replay" ] || continue
            base=$(basename "$replay" | sed -E 's/-[0-9]{4}-[0-9]{2}-[0-9]{2}T.+\.jsonl$//')
            golden="cassettes/golden/$base.jsonl"
            [ -f "$golden" ] || continue
            tmp=".tmp/diff-$base.md"
            set +e
            npm run --silent cassette-diff -- --replay "$replay" --golden "$golden" --out "$tmp"
            rc=$?
            set -e
            case "$rc" in
              0) ;;  # match
              1)
                drift=1
                cat "$tmp" >> .tmp/cassette-diff-summary.md
                echo "" >> .tmp/cassette-diff-summary.md
                ;;
              *)
                echo "cassette-diff exited $rc (invocation error)"
                exit "$rc"
                ;;
            esac
          done
          if [ "$drift" -eq 1 ]; then
            echo "# Drift detected" >> "$GITHUB_STEP_SUMMARY"
            cat .tmp/cassette-diff-summary.md >> "$GITHUB_STEP_SUMMARY"
            # Drift in the daily watch is a signal, not necessarily a
            # failure — model output naturally shifts. We exit 1 so
            # the workflow shows red on the GitHub dashboard, making
            # the signal visible. Maintainers triage in the morning.
            exit 1
          fi
      - if: always() && steps.gate.outputs.skip != 'true'
        name: Upload drift-watch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: l4-drift-watch-artifacts
          path: |
            .claude/tests/e2e/cassettes/replays/
            .claude/tests/e2e/.tmp/
          retention-days: 30
