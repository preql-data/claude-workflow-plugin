# Multi-tier CI for the claude-workflow-plugin.
#
# Tier matrix:
#   - lint           — shellcheck (advisory; never blocks).
#   - l1-unit        — bash unit tests (.claude/scripts/tests/).
#   - l2-component   — hook-pipeline component tests (.claude/tests/component/).
#                      Surfaces META-TEST counts as a distinct summary line so
#                      regression-injection sensitivity is visible at a glance.
#   - l3-vitest-unit — offline self-tests of the E2E harness (~55+ tests
#                      including the invariant engine specs from 0.8).
#   - manifest-validate — Zod-replica check of .claude-plugin/plugin.json.
#   - l3-live        — full live E2E suite. MANUAL ONLY (workflow_dispatch).
#                      Per phase 0.8, no automatic paid runs: no cron,
#                      no PR trigger, no push trigger. Live testing is a
#                      development-cycle activity, gated behind explicit
#                      operator invocation.
#
# Per 0.8, a normal PR or push run consumes ZERO API spend. The L4 daily
# drift watch is retired; goldens are debugging-only references.
#
# Permissions: contents:read for checkout. The live tier does not post
# PR comments (it only runs on workflow_dispatch, where there is no PR
# context).
#
# Portability:
#   - All jobs run on ubuntu-latest. shellcheck is pre-installed on the
#     standard runner image so the lint job just calls `make lint`.
#   - jq is also pre-installed; bd (Beads CLI) is not — L1/L2 invoke bd
#     only inside specs that have a `bd` shim or self-skip. We mirror
#     the local convention of skip-with-log rather than failing.
#   - Node 20 (LTS) for the L3 jobs.
#
# BD_SHIM_ONLY=1 — set on the l1-unit and l2-component jobs. Beads has
# no easy public installer URL we can curl in CI; rather than vendoring a
# binary or spinning up a separate setup action, we let bd-dependent
# specs skip-with-log when the env var is set. Each spec calls
# `bd_required_or_skip` (or the L1 equivalent) near the top, prints a
# single "SKIPPED:" line, and exits 0. Dev machines (where bd IS
# installed) take the normal path and run the full coverage.

name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    # Manual trigger — runs the offline tiers AND the live tier
    # (l3-live gates itself on github.event_name == 'workflow_dispatch').

# Cancel stale runs on the same PR/branch when a new push arrives.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Lint — non-blocking. shellcheck on all hook scripts.
  # ---------------------------------------------------------------------------
  lint:
    name: shellcheck (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Verify shellcheck available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck not on PATH (Makefile's lint target skips with log)"
            exit 0
          fi
          shellcheck --version
      - name: Run make lint
        run: make lint

  # ---------------------------------------------------------------------------
  # L1 — bash unit tests.
  # ---------------------------------------------------------------------------
  l1-unit:
    name: L1 — bash unit tests
    runs-on: ubuntu-latest
    env:
      # See workflow header — bd has no public CI installer; specs
      # self-skip when this is set.
      BD_SHIM_ONLY: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Verify dependencies
        run: |
          jq --version
          bash --version | head -1
      - name: Run L1 suite
        run: bash .claude/scripts/tests/run-tests.sh

  # ---------------------------------------------------------------------------
  # L2 — component tier. Hook-pipeline tests with crafted stdin envelopes.
  # ---------------------------------------------------------------------------
  l2-component:
    name: L2 — component (hook pipelines)
    runs-on: ubuntu-latest
    env:
      BD_SHIM_ONLY: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Verify dependencies
        run: |
          jq --version
          bash --version | head -1
      - name: Run L2 suite with full output capture
        id: run
        run: |
          set -o pipefail
          bash .claude/tests/component/run.sh 2>&1 | tee component-tier.log
      - name: Surface META-TEST summary (distinct category)
        if: always()
        run: |
          # META-TESTs prove the test's own sensitivity (vs regular
          # assertions, which prove SUT behaviour). We tally them
          # separately. The pattern matches both helper-emitted lines
          # (assert_eq with a META-TEST name) and ad-hoc inline
          # PASS/FAIL prints.
          total=$(grep -cE '^\s*(PASS|FAIL):\s+.*META-TEST' component-tier.log || true)
          pass=$(grep -cE '^\s*PASS:\s+.*META-TEST' component-tier.log || true)
          fail=$(grep -cE '^\s*FAIL:\s+.*META-TEST' component-tier.log || true)
          {
            echo "### META-TEST assertions"
            echo ""
            echo "_Distinct from regular assertions — META-TESTs prove the test's own sensitivity, not the SUT's behaviour._"
            echo ""
            echo "- Total: **${total}**"
            echo "- Passed: **${pass}**"
            echo "- Failed: **${fail}**"
            if [ "$fail" -gt 0 ]; then
              echo ""
              echo "Failures:"
              grep -E '^\s*FAIL:\s+.*META-TEST' component-tier.log | head -10 | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload component-tier log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-tier-log
          path: component-tier.log
          retention-days: 14

  # ---------------------------------------------------------------------------
  # L3 unit tier — offline self-tests of the e2e harness, including the
  # invariant engine specs introduced in 0.8. No API key.
  # ---------------------------------------------------------------------------
  l3-vitest-unit:
    name: L3 — vitest unit (offline harness self-tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .claude/tests/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Cache npm by the package-lock for this workspace.
          cache: "npm"
          cache-dependency-path: .claude/tests/e2e/package-lock.json
      - name: Install harness dependencies
        # --include=optional is defensive: `npm ci` already installs
        # optionalDependencies by default, but on ubuntu-latest the
        # @anthropic-ai/claude-agent-sdk's platform-specific glibc
        # native binary (`@anthropic-ai/claude-agent-sdk-linux-x64`)
        # was being skipped in favour of the musl variant. Forcing
        # the flag pins the behaviour against future npm changes
        # and any cache-state edge cases.
        run: npm ci --include=optional
      - name: Verify SDK glibc native binary present
        # Defensive: this tier doesn't invoke the SDK binary (it's
        # offline unit tests), but a missing glibc variant here is the
        # same upstream symptom that breaks the live tier. Failing here
        # gives an earlier, clearer signal.
        run: |
          if [ -d node_modules/@anthropic-ai/claude-agent-sdk-linux-x64 ]; then
            echo "OK: glibc native binary installed"
            ls -la node_modules/@anthropic-ai/claude-agent-sdk-linux-x64/ | head -5
          else
            echo "FAIL: expected glibc variant missing"
            ls -la node_modules/@anthropic-ai/ 2>&1 | head -20
            exit 1
          fi
      - name: Run offline unit tier
        run: npm run test:unit
      - name: Sanity-check test count
        # The spec calls for a meaningful unit tier (~55+ tests including
        # the new invariant engine specs from 0.8). A regression that
        # drops the count below 50 likely means the test:unit filter
        # missed files; we fail loudly so it's caught.
        run: |
          mkdir -p .tmp
          npx vitest run unit.spec --reporter=json --outputFile=.tmp/unit-results.json
          count=$(jq '[.testResults[].assertionResults[]] | length' .tmp/unit-results.json)
          echo "Unit tests collected: $count"
          if [ "$count" -lt 50 ]; then
            echo "ERROR: unit test count fell below the floor of 50 (got $count)."
            echo "       Did the test:unit glob lose a file?"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Manifest validation — Zod-replica check of .claude-plugin/plugin.json.
  # Cheap, fast; runs separately from the unit tier so a manifest break
  # surfaces as its own check.
  # ---------------------------------------------------------------------------
  manifest-validate:
    name: Plugin manifest validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .claude/tests/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .claude/tests/e2e/package-lock.json
      - name: Install harness dependencies
        run: npm ci
      - name: Validate manifest
        run: npx tsx lib/validate-plugin-manifest.ts

  # ---------------------------------------------------------------------------
  # L3 live tier — MANUAL ONLY.
  #
  # Per 0.8 (cross-cutting principle #9): no automatic paid runs. This
  # job runs only when an operator manually dispatches the workflow via
  # the GitHub UI or `gh workflow run`. It does NOT run on pull_request
  # or push. There is no PR context, so it does not post PR comments;
  # results land in $GITHUB_STEP_SUMMARY and as workflow artifacts.
  #
  # Live runs are also invariant-asserted now (0.8): the specs no
  # longer gate on golden-trace equality. A successful run = invariants
  # held. Cassette refresh, if anyone wants one, is a deliberate
  # `make cassette-diff` step on a dev machine.
  # ---------------------------------------------------------------------------
  l3-live:
    name: L3 — live (real Claude, manual only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [l3-vitest-unit, manifest-validate]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    defaults:
      run:
        working-directory: .claude/tests/e2e
    steps:
      - name: Require API key (manual dispatch implies live intent)
        working-directory: ${{ github.workspace }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "L3-live was dispatched without ANTHROPIC_API_KEY set."
            echo "Set the secret on this repo and re-dispatch."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .claude/tests/e2e/package-lock.json
      - name: Install harness dependencies
        run: npm ci --include=optional
      - name: Remove musl SDK variant; verify glibc variant present
        # The SDK's native-binary lookup tries the musl variant first
        # on linux and short-circuits the moment require.resolve()
        # succeeds — without checking the binary actually runs. On
        # ubuntu-latest (glibc), the musl tarball's `claude` file is
        # present but its dynamic linker isn't. Surgical fix: remove
        # the musl variant so the lookup falls through to glibc.
        run: |
          musl="node_modules/@anthropic-ai/claude-agent-sdk-linux-x64-musl"
          gnu="node_modules/@anthropic-ai/claude-agent-sdk-linux-x64/claude"
          if [ -d "$musl" ]; then
            echo "Removing musl variant: $musl"
            rm -rf "$musl"
          fi
          if [ -f "$gnu" ]; then
            echo "OK: glibc binary present"
            ls -l "$gnu"
          else
            echo "ERROR: glibc native binary missing at $gnu"
            ls node_modules/@anthropic-ai/ 2>&1 || true
            exit 1
          fi
      - name: Run full E2E suite (live)
        run: npm run test:run
      - name: Summarize live results
        if: always()
        run: |
          set -u
          {
            echo "## L3 live results"
            echo ""
            echo "Triggered manually via workflow_dispatch. Live e2e ran"
            echo "against real Claude; invariants are the gate (per 0.8 —"
            echo "no golden-trace equality)."
            echo ""
            if [ -d cassettes/replays ]; then
              echo "Replays produced this run:"
              for r in cassettes/replays/*.jsonl; do
                [ -e "$r" ] || continue
                echo "- $(basename "$r")"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload replays
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: l3-live-artifacts
          path: |
            .claude/tests/e2e/cassettes/replays/
            .claude/tests/e2e/.tmp/
          retention-days: 30
