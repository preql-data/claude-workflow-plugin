# node-react-auth — Phase A, fixture #1.
#
# This fixture exercises the canonical happy-path: a feature spans both
# backend (auth endpoint) and frontend (login form) so the orchestrator
# must delegate to BOTH @backend and @frontend, then route to @qa for
# approval before stopping. Per G8 plan, "Initial fixture set" table.
#
# The fixture is committed at HEAD with placeholder server/client code.
# The runFixture harness git-stashes any per-run mutations and restores
# the tree on completion, so this state is reusable across runs.

name: node-react-auth
description: |
  Tiny Node/Express + React workspace. Bare bones today; the prompt asks
  Claude to add a POST /auth/login endpoint with JWT plus a LoginForm
  component, and the spec asserts the orchestrator -> backend + frontend
  -> QA approval flow.

prompt: |
  Add a POST /auth/login endpoint with JWT tokens, plus a LoginForm component.

expected_subagents:
  - backend
  - frontend
  - qa

expected_hooks:
  - SessionStart
  - UserPromptSubmit
  - SubagentStart
  - PreToolUse
  - PostToolUse
  - Stop
  - SessionEnd

expected_label_progression:
  # Either the orchestrator opens an epic with two children, or a single
  # task gets the qa-pending -> qa-approved transition. The spec asserts
  # generic structure (qa-approved appears on at least one task) rather
  # than a fixed task ID.
  - qa-pending
  - qa-approved

# Model-agnostic invariants (v3.1.0, spec item 0.8). Live specs assert
# these via `await expect(trace).satisfiesInvariants(<fixture.yaml>)`.
# See .claude/tests/e2e/lib/invariants.ts for the implementations and
# .claude/tests/README.md for the schema.
#
# qa-queried-impact-of is added by claude-workflow-plugin-366.6 as the
# Phase B regression anchor: QA's frontmatter now grants code-graph MCP
# tools, so on a future live run QA can call impact_of and this
# invariant flips green. Before the 366.6 fix QA's `tools:` allowlist
# omitted all `mcp__*` entries and the SDK stripped MCP tools from QA's
# surface entirely — 0 impact_of calls in the seed trace.
invariants:
  - name: stop-requires-approval
  - name: orchestrator-no-edits
  - name: completion-contract
  - name: label-milestones
    params:
      milestones:
        - qa-pending
        - qa-approved
  - name: declared-subagents-only
    params:
      declared:
        - backend
        - frontend
        - qa
  - name: qa-queried-impact-of

notes: |
  - The fixture is a workspace (root + client subpkg). `npm test` runs
    vitest at the root; both server and client baselines are passing.
  - .beads is initialized empty so any task IDs in trace.beadsTasksCreated
    came from the run itself.
  - .git is a real repo with a single initial commit; runFixture's
    stash/restore depends on a clean git baseline.
