# mutation.conf — caps + sentinel lists for the mutation sweep.
#
# This file is shell-sourced by mutation-sweep.sh; keep entries as simple
# KEY=VALUE pairs (no command substitution, no arrays unless they are
# whitespace-separated single-line strings). Comments start with `#`.

# --- Caps ---------------------------------------------------------------

# Maximum mutants generated per target file in a single sweep run. This
# bounds the per-file blast radius — even a long script with many
# `[ X = Y ]` tests cannot push the sweep above MAX_MUTANTS_PER_FILE *
# 8 fault classes.
MAX_MUTANTS_PER_FILE=24

# Maximum mutants per sweep across all target files. Hard ceiling so a
# 20-target sweep cannot accidentally produce 600 mutants. Set to a
# value the offline tier can complete inside the sweep timeout.
MAX_MUTANTS_PER_RUN=60

# Maximum wall-clock seconds per mutant test run. The deterministic
# pass invokes a `bash <test-cmd>` per mutant inside the throwaway
# worktree; this bound prevents an infinite-loop mutant from hanging
# the sweep. Default 60s — generous for L1/L2 invocations which
# normally finish in <10s.
MUTANT_TEST_TIMEOUT_S=60

# Maximum wall-clock seconds for the entire sweep. The sweep aborts
# (cleaning up worktrees) if it crosses this budget. Set above
# MAX_MUTANTS_PER_RUN * MUTANT_TEST_TIMEOUT_S by a comfortable
# margin so realistic runs do not trip it.
SWEEP_TIMEOUT_S=1800

# --- Sentinels (used by F7 — string-literal mutation) -------------------
#
# Whitespace-separated list of label / sentinel strings the harness is
# permitted to mutate. Extend this list as new labels are introduced
# in the workflow. The generator picks a neighbour mutation by appending
# / dropping a single character so the result is a plausible typo.
SENTINELS="qa-pending qa-approved qa-blocked qa-gate-entered qa-deferred qa-escalated rubric-pending rubric-satisfied bug improvement backend frontend devops"

# --- Command exclusions (destructive / network mutators) ----------------
#
# Whitespace-separated list of leading-token commands the generator
# refuses to mutate. Even if a fault class would otherwise apply, lines
# starting with one of these are skipped.
COMMAND_EXCLUSIONS="rm mv cp curl wget gh push reset checkout"

# --- Judge seam ---------------------------------------------------------

# Estimated USD cost per judge call. Used by the cost-confirmation
# prompt; printed as `survivors * JUDGE_COST_PER_CALL` before the
# user confirms. C.2 owns the real value; C.1 ships an estimate.
JUDGE_COST_PER_CALL_USD="0.03"

# Maximum judge calls per sweep. The cost-gate stops the run if the
# survivor count would exceed this; the operator can rerun with a
# higher cap by passing `--judge-max <N>`.
JUDGE_MAX_CALLS=50

# Minimum judge precision on the calibration set (C.2). judge-gate.sh
# refuses to flip the calibration verdict to "passed" below this
# threshold — a judge that calls too many equivalents genuine isn't
# worth its API spend. Recall is reported alongside but is not a
# gating threshold: C.2's design bias is precision over recall (better
# to miss an equivalent than to bury a real regression — see judge.md
# "Uncertainty bias"). Adjust via this config knob, not in judge-gate.sh.
JUDGE_PRECISION_MIN=0.8
